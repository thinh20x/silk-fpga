name: SILK EDA - General Check

on:
  push:
    paths:
      - 'generic/rtl/**'
      - 'generic/tb/**'
      - 'generic/config.txt' # Đã bổ sung trigger chuẩn xác
  pull_request:
    paths:
      - 'generic/rtl/**'
      - 'generic/tb/**'
      - 'generic/config.txt'

jobs:
  run_eda_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Cập nhật môi trường SILK EDA
        run: docker pull huyatieo/silk-eda:latest

      - name: Khởi chạy SILK EDA
        run: |
          echo "=== KÍCH HOẠT SILK EDA ==="
          
          # 1. Tắt tính năng tự động thoát khi gặp lỗi của GitHub Runner
          set +e 
          
          # 2. Chạy Docker: Bắt toàn bộ luồng log (stdout & stderr) vào file eda_log.txt
          docker run --rm -v "${{ github.workspace }}/generic:/workspace" huyatieo/silk-eda:latest > generic/eda_log.txt 2>&1
          
          # 3. Lưu lại mã lỗi thực sự của quá trình chạy (0 là pass, khác 0 là fail)
          EXIT_CODE=$?
          
          # Vẫn in log ra console của GitHub để backup
          cat generic/eda_log.txt
          
          # 4. Gom file kết quả, file log và file thống kê tài nguyên vào thư mục ẩn
          cd generic
          mkdir -p .results
          mv *.svg *.md sim/*.vcd eda_log.txt resource_stat.txt .results/ 2>/dev/null || true
          
          # 5. Ép GitHub báo Xanh (Pass) hay Đỏ (Fail) dựa vào đúng mã lỗi
          exit $EXIT_CODE

      - name: Tự động lưu kết quả
        uses: stefanzweifel/git-auto-commit-action@v5
        # Luôn commit kết quả lên kể cả khi Verilator báo lỗi
        if: always()
        with:
          commit_message: "Tự động tạo báo cáo EDA, sơ đồ và Log (thư mục generic)"
          file_pattern: 'generic/.results/*'

      - name: Tạo Báo cáo Trực quan
        if: always()
        run: |
          REPO_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
          cd generic
          
          echo "# 📊 Báo Cáo Phân Tích SILK EDA" >> $GITHUB_STEP_SUMMARY
          
          # --- HIỂN THỊ TRỰC TIẾP LOG RA SUMMARY ---
          echo "## 💻 Nhật ký thực thi (Logs)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/eda_log.txt" ]; then
            cat .results/eda_log.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "Không thể tạo file log hoặc tiến trình bị ngắt đột ngột." >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # --- ĐỌC CONFIG ĐỂ RENDER ẢNH ---
          # Đảm bảo Markdown nhúng đúng đường link ảnh của Top Module
          if [ -f "config.txt" ]; then
            TOP_MODULE=$(grep "^TOP_MODULE" config.txt | awk -F'=' '{print $2}' | tr -d ' ' | tr -d '\r')
          else
            TOP_MODULE="unknown"
          fi
          
          echo "## 1. Sơ Đồ Module" >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/module_${TOP_MODULE}.svg" ]; then
             echo "![Sơ Đồ Module](${REPO_URL}/generic/.results/module_${TOP_MODULE}.svg)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 2. RTL Schematic" >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/schematic_${TOP_MODULE}.svg" ]; then
             echo "![Sơ Đồ Nguyên Lý RTL](${REPO_URL}/generic/.results/schematic_${TOP_MODULE}.svg)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 3. Sơ Đồ Trạng Thái (FSM)" >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/fsm_${TOP_MODULE}.svg" ]; then
             echo "![Sơ Đồ FSM](${REPO_URL}/generic/.results/fsm_${TOP_MODULE}.svg)" >> $GITHUB_STEP_SUMMARY
          else
             echo "*(Không phát hiện máy trạng thái - State Machine trong thiết kế này)*" >> $GITHUB_STEP_SUMMARY
          fi
          
          # --- HIỂN THỊ THỐNG KÊ TÀI NGUYÊN (Generic Cells) ---
          echo "## 4. Tài Nguyên Thiết Kế (Generic Cells)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          if [ -f ".results/resource_stat.txt" ]; then
             cat .results/resource_stat.txt >> $GITHUB_STEP_SUMMARY
          else
             echo "Không tìm thấy dữ liệu thống kê tài nguyên." >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "> 💡 **Mẹo:** Tải file \`.vcd\` trong thư mục \`generic/.results\` để xem sóng mô phỏng." >> $GITHUB_STEP_SUMMARY
